<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - 11 Avatar CRM</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D4AF37" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ==========================================
           SAME VARIABLES AS LOGIN + REGISTER SPECIFIC
           ========================================== */
        :root {
            --brand-white: #FFFFFF;
            --brand-gold: #D4AF37;
            --brand-gold-light: #E8C95A;
            --brand-gold-dark: #B8960F;
            --brand-gold-subtle: rgba(212, 175, 55, 0.15);
            --brand-black: #0A0A0A;
            --brand-black-light: #1A1A1A;
            --brand-black-lighter: #2A2A2A;
            
            --bg-primary: #0A0A0A;
            --bg-secondary: #1A1A1A;
            --bg-card: #1A1A1A;
            --bg-card-hover: #242424;
            --bg-input: #242424;
            --bg-glass: rgba(26, 26, 26, 0.7);
            
            --text-primary: #FFFFFF;
            --text-secondary: #D4AF37;
            --text-muted: #888888;
            --text-inverse: #0A0A0A;
            
            --border-color: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(212, 175, 55, 0.3);
            --border-gold-hover: rgba(212, 175, 55, 0.6);
            
            --shadow-gold: 0 4px 20px rgba(212, 175, 55, 0.25);
            --shadow-gold-hover: 0 8px 30px rgba(212, 175, 55, 0.4);
            --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.6);
            
            --btn-primary-bg: linear-gradient(135deg, #D4AF37, #E8C95A);
            --btn-primary-text: #0A0A0A;
            --btn-primary-hover: linear-gradient(135deg, #E8C95A, #F5D97E);
            
            --font-primary: 'Inter', sans-serif;
            --font-heading: 'Poppins', 'Inter', sans-serif;
        }
        
        body.light-mode {
            --bg-primary: #F8F6F0;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-card-hover: #F5F3ED;
            --bg-input: #F0EEE8;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --text-primary: #0A0A0A;
            --text-muted: #666666;
            --border-color: rgba(0, 0, 0, 0.08);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-primary);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -30%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -40%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        
        .register-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-card);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .register-brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .register-brand .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 4px;
        }
        .register-brand .logo .icon { font-size: 2rem; }
        .register-brand .logo .brand-name {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .register-brand .logo .brand-name .gold { color: var(--brand-gold); }
        .register-brand .tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .register-welcome {
            text-align: center;
            margin-bottom: 28px;
        }
        .register-welcome h1 {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .register-welcome p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .register-form { display: flex; flex-direction: column; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }
        .form-group label .required { color: #EF4444; }
        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .form-group .input-wrapper input, .form-group .input-wrapper select {
            width: 100%;
            padding: 11px 14px 11px 44px;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: var(--font-primary);
            transition: all 0.3s;
            outline: none;
        }
        .form-group .input-wrapper input:focus, .form-group .input-wrapper select:focus {
            border-color: var(--brand-gold);
            box-shadow: 0 0 0 4px var(--brand-gold-subtle);
        }
        .form-group .input-wrapper input::placeholder { color: var(--text-muted); }
        .form-group .input-wrapper select option { background: var(--bg-primary); }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group .input-wrapper .toggle-password {
            position: absolute;
            right: 14px;
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }
        .form-group .input-wrapper .toggle-password:hover { color: var(--text-secondary); }
        
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 4px 0;
        }
        .terms input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--brand-gold);
            margin-top: 2px;
            cursor: pointer;
        }
        .terms a { color: var(--brand-gold); text-decoration: none; }
        .terms a:hover { text-decoration: underline; }
        
        .btn-register {
            padding: 14px;
            background: var(--btn-primary-bg);
            border: none;
            border-radius: 10px;
            color: var(--btn-primary-text);
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-primary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: var(--shadow-gold);
            margin-top: 4px;
        }
        .btn-register:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold-hover);
        }
        .btn-register .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.2);
            border-top-color: var(--btn-primary-text);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn-register.loading .spinner { display: block; }
        .btn-register.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .divider span {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
        
        .social-login {
            display: flex;
            gap: 12px;
        }
        .social-login .btn-social {
            flex: 1;
            padding: 11px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }
        .social-login .btn-social:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--border-gold);
            color: var(--text-primary);
        }
        .social-login .btn-social.google i { color: #EA4335; }
        .social-login .btn-social.github i { color: var(--text-primary); }
        
        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .login-link a {
            color: var(--brand-gold);
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover { color: var(--brand-gold-light); }
        
        .theme-toggle-register {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: var(--shadow-card);
        }
        .theme-toggle-register:hover {
            border-color: var(--brand-gold);
            color: var(--brand-gold);
            transform: scale(1.05);
        }
        .error-message {
            display: none;
            padding: 10px 14px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            color: #EF4444;
            font-size: 0.85rem;
            align-items: center;
            gap: 10px;
        }
        .error-message.show { display: flex; }
        
        @media (max-width: 480px) {
            .register-container { padding: 28px 20px; border-radius: 16px; }
            .form-row { grid-template-columns: 1fr; }
            .social-login { flex-direction: column; }
            .theme-toggle-register { top: 16px; right: 16px; width: 38px; height: 38px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle-register" id="themeToggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="register-container">
        <div class="register-brand">
            <a href="/index.html" class="logo">
                <span class="icon">🚀</span>
                <span class="brand-name">11 <span class="gold">Avatar</span></span>
            </a>
            <p class="tagline">AI Revenue Operating System</p>
        </div>

        <div class="register-welcome">
            <h1>Create your account</h1>
            <p>Start your free journey today</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Something went wrong</span>
        </div>

        <form class="register-form" id="registerForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="firstName" placeholder="John" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="lastName" placeholder="Doe" />
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="you@company.com" required />
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number <span class="required">*</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" id="phone" placeholder="+91 98765 43210" required />
                </div>
            </div>

            <div class="form-group">
                <label for="company">Company Name <span class="required">*</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-building input-icon"></i>
                    <input type="text" id="company" placeholder="Your Company" required />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required />
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required />
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="industry">Industry</label>
                <div class="input-wrapper">
                    <i class="fas fa-industry input-icon"></i>
                    <select id="industry">
                        <option value="">Select your industry</option>
                        <option value="real_estate">Real Estate</option>
                        <option value="education">Education</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="finance">Finance</option>
                        <option value="manufacturing">Manufacturing</option>
                        <option value="retail">Retail</option>
                        <option value="insurance">Insurance</option>
                        <option value="automobile">Automobile</option>
                        <option value="it">IT / SaaS</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required />
                <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
                <span class="spinner"></span>
            </button>
        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="social-login">
            <a href="#" class="btn-social google"><i class="fab fa-google"></i> Google</a>
            <a href="#" class="btn-social github"><i class="fab fa-github"></i> GitHub</a>
        </div>

        <p class="login-link">
            Already have an account? <a href="/login.html">Sign in</a>
        </p>
    </div>

    <script>
        // Theme
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.className = 'fas fa-sun';
        }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            themeIcon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // Toggle Password
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePassword.querySelector('i').className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
        });

        // Form Submit
        const form = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');

            const firstName = document.getElementById('firstName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const company = document.getElementById('company').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            if (!firstName || !email || !phone || !company || !password) {
                showError('Please fill in all required fields');
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            if (!terms) {
                showError('Please agree to the Terms of Service');
                return;
            }

            registerBtn.classList.add('loading');
            registerBtn.disabled = true;

            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                window.location.href = '/dashboard.html';
            } catch (error) {
                showError(error.message || 'Registration failed. Please try again.');
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
        }

        console.log('🚀 11 Avatar CRM - Register Page Loaded');
        console.log('🎨 Theme:', savedTheme);
    </script>

</body>
</html>
